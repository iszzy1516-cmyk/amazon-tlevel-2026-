<!DOCTYPE html><html lang="en"><head><link rel="stylesheet" href="styles/main.css"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Create Account — Amazon T-Level</title></head><body><header class="site-header"><a href="index.html" class="brand"><img src="assets/images/amazon-logo.png" alt="Amazon"><span>T-Level Courses</span></a><input type="checkbox" id="menu-toggle" class="menu-toggle"><label for="menu-toggle" class="menu-icon">☰</label><nav class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav></header><main><div class="container"><div class="text-center mb-2"><img src="assets/images/amazon-logo.png" alt="Amazon" style="height:40px"></div><h1 class="page-title">Create account</h1><div id="alertBox" class="alert alert-error"></div><form id="signupForm" action="/api/register" method="POST"><div class="form-group"><label for="fname">First name <span class="required">*</span></label><input type="text" id="fname" name="userFirstName" required placeholder="First name"></div><div class="form-group"><label for="lname">Last name <span class="required">*</span></label><input type="text" id="lname" name="userLastName" required placeholder="Last name"></div><div class="form-group"><label for="email">Email <span class="required">*</span></label><input type="email" id="email" name="userEmail" required placeholder="Email"></div><div class="form-group"><label for="password">Password <span class="required">*</span></label><input type="password" id="password" name="userPassword" required minlength="8" placeholder="At least 8 chars, 1 uppercase, 1 number"></div><div class="form-group"><label for="confirm">Re-enter password <span class="required">*</span></label><input type="password" id="confirm" required placeholder="Confirm password"><p class="error-text" id="matchError">Passwords do not match.</p></div><div class="form-group"><label for="location">Location</label><input type="text" id="location" name="userLocation" placeholder="Town or Postcode"></div><div class="form-group"><label>User type <span class="required">*</span></label><div class="radio-group"><label><input type="radio" name="userType" value="STUDENT" required> Student</label><label><input type="radio" name="userType" value="PARENT"> Parent</label><label><input type="radio" name="userType" value="COLLEGE_STAFF"> Staff</label></div></div><div class="form-group"><div class="checkbox-group"><input type="checkbox" id="gdpr" name="gdprConsent" value="true" required><label for="gdpr">I agree to data processing per UK GDPR. <span class="required">*</span></label></div></div><button type="submit" class="btn btn-primary">Create your account</button></form><p class="mt-2" style="font-size:13px;text-align:center">Already have an account? <a href="choose-login.html" class="help-link">Sign In</a></p></div></main><footer class="site-footer"><div class="footer-bottom" style="border:none;margin-top:0">© 2026 Amazon T-Level Portal</div></footer><script>const f=document.getElementById('signupForm'),a=document.getElementById('alertBox'),p=document.getElementById('password'),c=document.getElementById('confirm'),m=document.getElementById('matchError');c.addEventListener('input',()=>{if(c.value&&c.value!==p.value){c.classList.add('error');m.classList.add('visible')}else{c.classList.remove('error');m.classList.remove('visible')}});f.addEventListener('submit',async e=>{e.preventDefault();if(p.value!==c.value){a.className='alert alert-error visible';a.textContent='Passwords do not match.';return}if(!/(?=.*[A-Z])(?=.*[0-9])/.test(p.value)){a.className='alert alert-error visible';a.textContent='Password needs 1 uppercase and 1 number.';return}const d=new URLSearchParams(new FormData(f));try{const r=await fetch(f.action,{method:'POST',body:d,headers:{'Content-Type':'application/x-www-form-urlencoded'}});const j=await r.json();if(j.success){a.className='alert alert-success visible';a.textContent=j.message||'Account created!';setTimeout(()=>window.location.href='student-login.html',1200)}else{a.className='alert alert-error visible';a.textContent=j.message||'Registration failed.'}}catch(x){a.className='alert alert-error visible';a.textContent='Network error. Please try again.'}})</script></body></html>
