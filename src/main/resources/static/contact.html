<!DOCTYPE html><html lang="en"><head><link rel="stylesheet" href="styles/main.css"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Contact Us — Amazon T-Level</title></head><body><header class="site-header"><a href="index.html" class="brand"><img src="assets/images/amazon-logo.png" alt="Amazon"><span>T-Level Courses</span></a><input type="checkbox" id="menu-toggle" class="menu-toggle"><label for="menu-toggle" class="menu-icon">☰</label><nav class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="choose-login.html" class="btn-small">Sign In</a></nav></header><main><div class="container container-wide"><h1 class="page-title">Contact Us</h1><p style="color:var(--text-secondary);margin-bottom:20px">Have a question? Send us a message and we will respond within 24 hours.</p><div id="alertBox" class="alert alert-success"></div><form id="contactForm" action="/api/contact/submit" method="POST"><div style="display:grid;gap:18px;grid-template-columns:1fr 1fr"><div class="form-group"><label for="fn">First name <span class="required">*</span></label><input type="text" id="fn" name="firstName" required placeholder="First name"></div><div class="form-group"><label for="ln">Last name <span class="required">*</span></label><input type="text" id="ln" name="lastName" required placeholder="Last name"></div></div><div class="form-group"><label for="em">Email <span class="required">*</span></label><input type="email" id="em" name="userEmail" required placeholder="Email"></div><div class="form-group"><label for="msg">Message <span class="required">*</span></label><textarea id="msg" name="messageBody" rows="6" required minlength="10" maxlength="2000" placeholder="How can we help?" style="resize:vertical"></textarea></div><button type="submit" class="btn btn-primary">Send Message</button></form></div></main><footer class="site-footer"><div class="footer-content"><div class="footer-col"><h4>Learn More</h4><a href="about.html">About T-Levels</a><a href="#">For Employers</a><a href="#">For Colleges</a></div><div class="footer-col"><h4>Support</h4><a href="contact.html">Contact Us</a><a href="#">Help Centre</a><a href="#">Accessibility</a></div><div class="footer-col"><h4>Account</h4><a href="choose-login.html">Sign In</a><a href="signup.html">Create Account</a></div></div><div class="footer-bottom">© 2026 Amazon T-Level Portal</div></footer><script>document.getElementById('contactForm').addEventListener('submit',async e=>{e.preventDefault();const f=e.target,a=document.getElementById('alertBox'),d=new URLSearchParams(new FormData(f));try{const r=await fetch(f.action,{method:'POST',body:d,headers:{'Content-Type':'application/x-www-form-urlencoded'}});const j=await r.json();if(j.success){a.className='alert alert-success visible';a.textContent=j.message;f.reset()}else{a.className='alert alert-error visible';a.textContent=j.message||'Failed to send.'}}catch(x){a.className='alert alert-error visible';a.textContent='Network error. Please try again.'}})</script></body></html>
