<!DOCTYPE html><html lang="en"><head><link rel="stylesheet" href="styles/main.css"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign In — Amazon T-Level</title></head><body><header class="site-header"><a href="index.html" class="brand"><img src="assets/images/amazon-logo.png" alt="Amazon"><span>T-Level Courses</span></a><input type="checkbox" id="menu-toggle" class="menu-toggle"><label for="menu-toggle" class="menu-icon">☰</label><nav class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav></header><main><div class="container"><div class="text-center mb-2"><img src="assets/images/amazon-logo.png" alt="Amazon" style="height:40px"></div><h1 class="page-title">Sign In</h1><div id="alertBox" class="alert alert-error"></div><form id="loginForm" action="/api/login" method="POST"><div class="form-group"><label for="email">Email <span class="required">*</span></label><input type="email" id="email" name="inputEmail" required placeholder="Enter your email"></div><div class="form-group"><label for="password">Password <span class="required">*</span></label><input type="password" id="password" name="inputPassword" required placeholder="Enter your password"></div><button type="submit" class="btn btn-primary">Sign In</button></form><div class="mt-2"><a href="#" class="help-link">Forgot your password?</a></div><div class="divider"><span>New to Amazon T-Levels?</span></div><a href="signup.html" class="btn btn-secondary">Create your account</a></div></main><footer class="site-footer"><div class="footer-bottom" style="border:none;margin-top:0">© 2026 Amazon T-Level Portal</div></footer><script>document.getElementById('loginForm').addEventListener('submit',async function(e){e.preventDefault();const f=e.target,a=document.getElementById('alertBox'),d=new URLSearchParams(new FormData(f));try{const r=await fetch(f.action,{method:'POST',body:d,headers:{'Content-Type':'application/x-www-form-urlencoded'}});const j=await r.json();if(j.success){a.className='alert alert-success visible';a.textContent='Login successful! Redirecting...';let dest='dashboard-student.html';if(j.userRole==='PARENT')dest='dashboard-parent.html';else if(j.userRole==='COLLEGE_STAFF')dest='dashboard-staff.html';else if(j.userRole==='AMAZON_STAFF'||j.userRole==='ADMIN')dest='dashboard-admin.html';setTimeout(()=>window.location.href=dest,800)}else{a.className='alert alert-error visible';a.textContent=j.message||'Invalid email or password.'}}catch(x){a.className='alert alert-error visible';a.textContent='Network error. Please try again.'}})</script></body></html>
